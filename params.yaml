# ============================================================
# params.yaml — DVC-tracked parameters
# ============================================================

# ── Shared config passed to every stage ──
base:
  seed: 42
  dropout: 0.3
  num_classes: 10
  class_names:
    - T-shirt/top
    - Trouser
    - Pullover
    - Dress
    - Coat
    - Sandal
    - Shirt
    - Sneaker
    - Bag
    - Ankle boot

paths:
  raw_dir: data/raw
  processed_dir: data/processed
  models_dir: models
  metrics_dir: metrics
  dvclive_dir: dvclive

# ── Stage: load_data ──
load_data:
  # source options: "download" | "local" | "s3"
  source: download

  # Used when source=local (path to existing raw data)
  local_path:

  # Used when source=s3
  s3_uri:

# ── Stage: preprocess ──
preprocess:
  normalize: true
  flatten: false        # false=keep 2D for CNN, true=flatten for dense
  validation_split: 0.2

# ── Stage: train ──
train:
  arch_config: configs/cnn_basic.yml
  epochs: 10
  batch_size: 64
  lr: 0.001
  optimizer: adam       # adam | sgd | rmsprop

# ── Stage: evaluate ──
evaluate:
  save_confusion_matrix: true
  save_classification_report: true

# ============================================================
# ── Execution environment ──
# Controls whether pipeline stages run locally or on cloud.
# This section is NOT consumed by Python code directly —
# it is read by CI (GitHub Actions workflow_dispatch inputs
# override this at runtime) and by scripts/run_pipeline.sh.
#
# runner: local   → run on your machine / GitHub-hosted runner
# runner: cloud   → provision EC2 via CML (used in CI)
# ============================================================
execution:
  runner: local             # local | cloud

  cloud:
    provider: aws
    region: eu-north-1      # Stockholm — matches your DVC S3 bucket
    instance_type: t3.xlarge
    spot: true              # use spot instances to cut cost ~70%
    idle_timeout_s: 3600    # terminate runner after 1h idle

  # DVC remote — mirrors .dvc/config but documented here
  dvc_remote:
    name: s3remote
    bucket: fashion-mnist-mlops   # set to your actual bucket name
    prefix: fashion-mnist
