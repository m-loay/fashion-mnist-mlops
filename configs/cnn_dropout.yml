# CNN + BatchNorm + Dropout — Production quality
# Expected accuracy: ~92%
# Best performing architecture for this dataset

description: "3-layer CNN with batch normalization and dropout"

layers:
  - type: conv2d
    filters: 32
    kernel_size: [3, 3]
    activation: relu
    padding: same
  - type: batch_norm
  - type: max_pool2d
    pool_size: [2, 2]
  - type: conv2d
    filters: 64
    kernel_size: [3, 3]
    activation: relu
    padding: same
  - type: batch_norm
  - type: max_pool2d
    pool_size: [2, 2]
  - type: conv2d
    filters: 128
    kernel_size: [3, 3]
    activation: relu
    padding: same
  - type: batch_norm
  - type: global_avg_pool2d
  - type: dense
    units: 128
    activation: relu
  - type: dropout
    rate: 0.4
  - type: dense
    units: 64
    activation: relu
