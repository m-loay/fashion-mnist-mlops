# =============================================================
# .github/workflows/train.yml
#
# TRIGGERS:
#   - Push to main branch          → trains on AWS EC2 (cloud)
#   - PR targeting main branch     → trains on AWS EC2, posts report to PR
#   - Push to ANY other branch     → does NOT trigger
#   - Manual dispatch              → choose instance type
#
# SECRETS REQUIRED (repo Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_SUBNET_ID
#   AWS_SECURITY_GROUP_ID
#   CML_PAT
#
# CONTAINER:
#   ghcr.io/m-loay/dvc-cml-mlops:latest
#   Contains: Python 3.12, CML, git, nodejs.
#   ML packages installed at runtime from requirements.txt.
#
# DESIGN:
#   Job 1 (start-runner): provisions EC2 spot runner in eu-north-1.
#   Job 2 (train):        runs inside container, executes DVC pipeline.
#   Job 3 (stop-runner):  always terminates EC2 after train.
#
# BUGS FIXED:
#   1. permissions: added pull-requests: write (required to post PR comments)
#   2. Post report: curl was silently failing when PR number is empty
#      (push-to-main has no PR number → URL was ".../issues//comments" → 404)
#   3. curl -s swallowed all errors → changed to show response + exit on failure
#   4. Metrics extraction: added debug step to confirm files exist + their content
#   5. Raw image URLs: images must be git-committed (not just DVC-tracked).
#      The commit step does `git add metrics/` so they are in git — but only if
#      DVC is not also tracking them. Added explicit dvc pull of outputs to
#      ensure files land in workspace before commit.
#   6. Added GitHub Step Summary as guaranteed fallback (always renders, even
#      on push-to-main where there is no PR to comment on).
# =============================================================

name: ML Pipeline

permissions:
  contents: write
  pull-requests: write   # FIX 1: required to post PR comments via API

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "configs/**"
      - "params.yaml"
      - "dvc.yaml"
      - "requirements.txt"

  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "configs/**"
      - "params.yaml"
      - "dvc.yaml"

  workflow_dispatch:
    inputs:
      instance_type:
        description: "EC2 instance type"
        type: choice
        default: "t3.small"
        options:
          - t3.small       # 2 vCPU  2 GB  — default, free-tier eligible
          - t3.micro       # 2 vCPU  1 GB  — free-tier, may OOM on training

# =============================================================
# Job 1 — provision EC2 runner
# =============================================================
jobs:
  start-runner:
    runs-on: ubuntu-latest
    outputs:
      runner-label: ${{ steps.ec2.outputs.label }}
      instance-id:  ${{ steps.ec2.outputs.ec2-instance-id }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            eu-north-1

      - name: Start EC2 runner
        id: ec2
        uses: machulav/ec2-github-runner@v2
        with:
          mode:              start
          github-token:      ${{ secrets.CML_PAT }}
          ec2-image-id:      ami-0028809abe98af413
          ec2-instance-type: ${{ inputs.instance_type || 't3.small' }}
          subnet-id:         ${{ secrets.AWS_SUBNET_ID }}
          security-group-id: ${{ secrets.AWS_SECURITY_GROUP_ID }}
          market-type:       spot
          startup-timeout-minutes: 10
          pre-runner-script: |
            sudo apt-get update -y -q
            sudo apt-get install -y -q jq docker.io
            sudo systemctl enable docker
            sudo systemctl start docker

# =============================================================
# Job 2 — run DVC pipeline inside container
# =============================================================
  train:
    needs: start-runner
    runs-on: ${{ needs.start-runner.outputs.runner-label }}
    timeout-minutes: 90
    container:
      image: ghcr.io/m-loay/dvc-cml-mlops:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install ML dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: DVC pull from S3
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          dvc remote modify s3remote region eu-north-1
          dvc pull --run-cache

      - name: DVC repro
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: dvc repro

      - name: DVC push to S3
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: dvc push

      # FIX 4: Debug — confirm metric files and images exist in workspace
      # Check this in the Actions log. If files are "MISSING", your DVC
      # pipeline is not writing them to these paths, and nothing downstream
      # will work. Fix your pipeline stages to write to metrics/ and dvclive/.
      - name: Debug workspace
        if: always()
        run: |
          echo "========== WORKSPACE FILE TREE =========="
          find metrics/ dvclive/ -type f 2>/dev/null || echo "(metrics/ and dvclive/ not found)"
          echo ""
          echo "========== dvclive/metrics.json =========="
          cat dvclive/metrics.json 2>/dev/null || echo "MISSING"
          echo ""
          echo "========== metrics/eval.json =========="
          cat metrics/eval.json 2>/dev/null || echo "MISSING"
          echo ""
          echo "========== image files =========="
          ls -lh metrics/*.png 2>/dev/null || echo "No PNG files in metrics/"

      - name: Commit pipeline outputs
        run: |
          git config user.email "ci@github-actions"
          git config user.name "GitHub Actions"
          git add dvc.lock metrics/ dvclive/
          git diff --staged --quiet || \
            git commit -m "ci: update pipeline outputs [skip ci]"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}

      # ── Extract metrics ──────────────────────────────────────
      # dvclive/metrics.json: {"accuracy": {"train": 0.94, "val": 0.92}}
      # metrics/eval.json:    {"test_accuracy": 0.89}
      - name: Extract metrics
        id: metrics
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, os

          out = os.environ["GITHUB_OUTPUT"]
          fmt = lambda v: f"{v:.4f}" if isinstance(v, float) else str(v)

          train_acc = test_acc = "N/A"

          try:
              with open("dvclive/metrics.json") as f:
                  live = json.load(f)
              print(f"dvclive/metrics.json content: {live}")
              acc = live.get("accuracy", {})
              # Handle both {"accuracy": {"train": 0.9}} and {"train": 0.9}
              if isinstance(acc, dict):
                  train_acc = fmt(acc.get("train", "N/A"))
              elif isinstance(live.get("train"), (int, float)):
                  train_acc = fmt(live["train"])
          except Exception as e:
              print(f"dvclive/metrics.json error: {e}")

          try:
              with open("metrics/eval.json") as f:
                  ev = json.load(f)
              print(f"metrics/eval.json content: {ev}")
              test_acc = fmt(ev.get("test_accuracy", ev.get("accuracy", "N/A")))
          except Exception as e:
              print(f"metrics/eval.json error: {e}")

          with open(out, "a") as f:
              f.write(f"train_acc={train_acc}\n")
              f.write(f"test_acc={test_acc}\n")

          print(f"FINAL → train={train_acc}  test={test_acc}")
          PYEOF

      # ── Build report markdown ────────────────────────────────
      - name: Build report
        id: report
        if: always()
        run: |
          COMMIT_SHA=$(git rev-parse HEAD)
          RAW="https://raw.githubusercontent.com/${{ github.repository }}/${COMMIT_SHA}"

          cat > report.md <<EOF
          ## ML Pipeline Report

          | Split | Accuracy |
          |-------|----------|
          | Train | \`${{ steps.metrics.outputs.train_acc }}\` |
          | Test  | \`${{ steps.metrics.outputs.test_acc }}\`  |

          EOF

          if [ -f metrics/loss_curve.png ]; then
            echo "### Loss Curve" >> report.md
            echo "![Loss Curve](${RAW}/metrics/loss_curve.png)" >> report.md
            echo "" >> report.md
          else
            echo "_(loss_curve.png not found in workspace)_" >> report.md
            echo "" >> report.md
          fi

          if [ -f metrics/confusion_matrix.png ]; then
            echo "### Confusion Matrix" >> report.md
            echo "![Confusion Matrix](${RAW}/metrics/confusion_matrix.png)" >> report.md
          else
            echo "_(confusion_matrix.png not found in workspace)_" >> report.md
          fi

          echo "--- Built report.md ---"
          cat report.md

      # ── Always post to GitHub Step Summary ───────────────────
      # FIX 6: Step Summary always renders correctly (base64 OK here).
      # Visible in Actions → run → train job → Summary tab.
      # Works on both push-to-main AND PR triggers.
      - name: Write step summary
        if: always()
        run: |
          cat report.md >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f metrics/loss_curve.png ]; then
            echo "### Loss Curve (inline)" >> $GITHUB_STEP_SUMMARY
            echo "![Loss Curve](data:image/png;base64,$(base64 -w 0 metrics/loss_curve.png))" >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f metrics/confusion_matrix.png ]; then
            echo "### Confusion Matrix (inline)" >> $GITHUB_STEP_SUMMARY
            echo "![Confusion Matrix](data:image/png;base64,$(base64 -w 0 metrics/confusion_matrix.png))" >> $GITHUB_STEP_SUMMARY
          fi

      # ── Post PR comment ──────────────────────────────────────
      # FIX 2+3: Guard on PR number — empty on push-to-main.
      # Show curl response so failures are visible in logs.
      - name: Post PR comment
        if: always() && github.event.pull_request.number != ''
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          echo "Posting comment to PR #${PR_NUMBER}"

          python3 - <<'PYEOF'
          import json
          with open("report.md") as f:
              body = f.read()
          with open("payload.json", "w") as f:
              json.dump({"body": body}, f)
          PYEOF

          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST \
            -H "Authorization: token ${{ secrets.CML_PAT }}" \
            -H "Content-Type: application/json" \
            -d @payload.json \
            "https://api.github.com/repos/${{ github.repository }}/issues/${PR_NUMBER}/comments")

          HTTP_STATUS=$(echo "$RESPONSE" | grep "HTTP_STATUS:" | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | grep -v "HTTP_STATUS:")

          echo "HTTP Status: ${HTTP_STATUS}"
          echo "Response: ${BODY}"

          if [ "$HTTP_STATUS" != "201" ]; then
            echo "ERROR: Expected HTTP 201, got ${HTTP_STATUS}"
            exit 1
          fi

          echo "PR comment posted successfully."

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ml-report
          path: |
            report.md
            metrics/
            dvclive/
          retention-days: 30

# =============================================================
# Job 3 — terminate EC2 runner
# =============================================================
  stop-runner:
    needs: [start-runner, train]
    runs-on: ubuntu-latest
    if: ${{ always() && needs.start-runner.result == 'success' }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            eu-north-1

      - name: Stop EC2 runner
        uses: machulav/ec2-github-runner@v2
        with:
          mode:            stop
          github-token:    ${{ secrets.CML_PAT }}
          label:           ${{ needs.start-runner.outputs.runner-label }}
          ec2-instance-id: ${{ needs.start-runner.outputs.instance-id }}