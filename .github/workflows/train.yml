# =============================================================
# .github/workflows/train.yml
#
# TRIGGERS:
#   - Push to main branch          → trains on AWS EC2 (cloud)
#   - PR targeting main branch     → trains on AWS EC2, posts report to PR
#   - Push to ANY other branch     → does NOT trigger
#   - Manual dispatch              → choose instance type
#
# SECRETS REQUIRED (repo Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   AWS_SUBNET_ID
#   AWS_SECURITY_GROUP_ID
#   CML_PAT
#
# CONTAINER:
#   ghcr.io/m-loay/dvc-cml-mlops:latest
#   Contains: Python 3.12, CML, git, nodejs.
#   ML packages installed at runtime from requirements.txt.
#
# DESIGN:
#   Job 1 (start-runner): provisions EC2 spot runner in eu-north-1.
#   Job 2 (train):        runs inside container, executes DVC pipeline.
#   Job 3 (stop-runner):  always terminates EC2 after train.
# =============================================================

name: ML Pipeline

permissions:
  contents: write

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "configs/**"
      - "params.yaml"
      - "dvc.yaml"
      - "requirements.txt"

  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "configs/**"
      - "params.yaml"
      - "dvc.yaml"

  workflow_dispatch:
    inputs:
      instance_type:
        description: "EC2 instance type"
        type: choice
        default: "t3.small"
        options:
          - t3.small       # 2 vCPU  2 GB  — default, free-tier eligible
          - t3.micro       # 2 vCPU  1 GB  — free-tier, may OOM on training

# =============================================================
# Job 1 — provision EC2 runner
# =============================================================
jobs:
  start-runner:
    runs-on: ubuntu-latest
    outputs:
      runner-label: ${{ steps.ec2.outputs.label }}
      instance-id:  ${{ steps.ec2.outputs.ec2-instance-id }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            eu-north-1

      - name: Start EC2 runner
        id: ec2
        uses: machulav/ec2-github-runner@v2
        with:
          mode:              start
          github-token:      ${{ secrets.CML_PAT }}
          ec2-image-id:      ami-0028809abe98af413
          ec2-instance-type: ${{ inputs.instance_type || 't3.small' }}
          subnet-id:         ${{ secrets.AWS_SUBNET_ID }}
          security-group-id: ${{ secrets.AWS_SECURITY_GROUP_ID }}
          market-type:       spot
          startup-timeout-minutes: 10
          pre-runner-script: |
            sudo apt-get update -y -q
            sudo apt-get install -y -q jq docker.io
            sudo systemctl enable docker
            sudo systemctl start docker

# =============================================================
# Job 2 — run DVC pipeline inside container
# =============================================================
  train:
    needs: start-runner
    runs-on: ${{ needs.start-runner.outputs.runner-label }}
    timeout-minutes: 90
    container:
      image: ghcr.io/m-loay/dvc-cml-mlops:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install ML dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: DVC pull from S3
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          dvc remote modify s3remote region eu-north-1
          dvc pull --run-cache

      - name: DVC repro
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: dvc repro

      - name: DVC push to S3
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: dvc push

      - name: Commit pipeline outputs
        run: |
          git config user.email "ci@github-actions"
          git config user.name "GitHub Actions"
          git add dvc.lock metrics/ dvclive/
          git diff --staged --quiet || \
            git commit -m "ci: update pipeline outputs [skip ci]"
          git push || true

      # ── Extract metrics ──────────────────────────────────────
      # dvclive/metrics.json: {"accuracy": {"train": 0.94, "val": 0.92}}
      # metrics/eval.json:    {"test_accuracy": 0.89}
      - name: Extract metrics
        id: metrics
        run: |
          python3 - <<'PYEOF'
          import json, os

          out = os.environ["GITHUB_OUTPUT"]
          fmt = lambda v: f"{v:.4f}" if isinstance(v, float) else str(v)

          train_acc = test_acc = "N/A"

          try:
              with open("dvclive/metrics.json") as f:
                  live = json.load(f)
              acc = live.get("accuracy", {})
              train_acc = fmt(acc.get("train", "N/A"))
          except Exception as e:
              print(f"dvclive/metrics.json error: {e}")

          try:
              with open("metrics/eval.json") as f:
                  ev = json.load(f)
              test_acc = fmt(ev.get("test_accuracy", ev.get("accuracy", "N/A")))
          except Exception as e:
              print(f"metrics/eval.json error: {e}")

          with open(out, "a") as f:
              f.write(f"train_acc={train_acc}\n")
              f.write(f"test_acc={test_acc}\n")

          print(f"train={train_acc}  test={test_acc}")
          PYEOF

      # ── Post report via GitHub API ───────────────────────────
      # Images embedded as base64 — renders inline in PR comment.
      # Uses curl + GitHub API directly — no cml publish, no Cloudflare.
      - name: Post report
        if: always()
        run: |
          echo "## ML Pipeline Report" >> report.md
          echo "" >> report.md
          echo "| Split | Accuracy |" >> report.md
          echo "|-------|----------|" >> report.md
          echo "| Train | \`${{ steps.metrics.outputs.train_acc }}\` |" >> report.md
          echo "| Test  | \`${{ steps.metrics.outputs.test_acc }}\`  |" >> report.md
          echo "" >> report.md

          if [ -f metrics/loss_curve.png ]; then
            echo "### Loss Curve" >> report.md
            echo "![Loss Curve](data:image/png;base64,$(base64 -w 0 metrics/loss_curve.png))" >> report.md
            echo "" >> report.md
          fi

          if [ -f metrics/confusion_matrix.png ]; then
            echo "### Confusion Matrix" >> report.md
            echo "![Confusion Matrix](data:image/png;base64,$(base64 -w 0 metrics/confusion_matrix.png))" >> report.md
          fi

          BODY=$(cat report.md)
          curl -s -X POST \
            -H "Authorization: token ${{ secrets.CML_PAT }}" \
            -H "Content-Type: application/json" \
            -d "{\"body\": $(echo "$BODY" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}" \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments"

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ml-report
          path: |
            report.md
            metrics/
            dvclive/
          retention-days: 30

# =============================================================
# Job 3 — terminate EC2 runner
# =============================================================
  stop-runner:
    needs: [start-runner, train]
    runs-on: ubuntu-latest
    if: ${{ always() && needs.start-runner.result == 'success' }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            eu-north-1

      - name: Stop EC2 runner
        uses: machulav/ec2-github-runner@v2
        with:
          mode:            stop
          github-token:    ${{ secrets.CML_PAT }}
          label:           ${{ needs.start-runner.outputs.runner-label }}
          ec2-instance-id: ${{ needs.start-runner.outputs.instance-id }}