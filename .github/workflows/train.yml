# =============================================================
# .github/workflows/train.yml
#
# TRIGGERS:
#   - Push to main branch          → trains on AWS EC2 (cloud)
#   - PR targeting main branch     → trains on AWS EC2, posts report to PR
#   - Push to ANY other branch     → does NOT trigger
#   - Manual dispatch              → choose instance type
#
# SECRETS REQUIRED (repo Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#
# DESIGN:
#   Job 1 (deploy-runner): provisions a CML spot EC2 runner in eu-north-1
#   Job 2 (train): runs the full DVC pipeline on that EC2 instance,
#                  pushes results to S3, posts CML report to GitHub
# =============================================================

name: ML Pipeline

on:
  push:
    branches:
      - main                        # only main — not feature/* or any other branch
    paths:
      - "src/**"
      - "configs/**"
      - "params.yaml"
      - "dvc.yaml"
      - "requirements.txt"

  pull_request:
    branches:
      - main                        # only PRs whose target is main
    paths:
      - "src/**"
      - "configs/**"
      - "params.yaml"
      - "dvc.yaml"

  workflow_dispatch:
    inputs:
      instance_type:
        description: "EC2 instance type"
        type: choice
        default: "t3.medium"
        options:
          - t3.medium      # 2 vCPU  4 GB  — default, cheapest viable
          - t3.large       # 2 vCPU  8 GB
          - t3.xlarge      # 4 vCPU 16 GB
          - g4dn.xlarge    # 4 vCPU 16 GB + T4 GPU

# =============================================================
# Job 1 — provision CML EC2 runner
# =============================================================
jobs:
  deploy-runner:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: iterative/setup-cml@v3

      - name: Launch CML EC2 spot runner
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          cml runner launch \
            --cloud=aws \
            --cloud-region=eu-north-1 \
            --cloud-type=${{ inputs.instance_type || 't3.medium' }} \
            --cloud-spot \
            --labels=cml-runner \
            --idle-timeout=300 \
            --single

# =============================================================
# Job 2 — run DVC pipeline on the EC2 runner
# =============================================================
  train:
    needs: deploy-runner
    runs-on: [self-hosted, cml-runner]
    timeout-minutes: 90

    steps:
      - uses: actions/checkout@v4

      # ── Python ──────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install "dvc[s3]"

      # ── CML (for posting the report) ───────────────────────
      - uses: iterative/setup-cml@v3

      # ── Pull cached data + models from S3 ──────────────────
      # dvc pull fetches whatever stages are already cached in S3,
      # so the pipeline only re-runs stages that actually changed.
      - name: DVC pull from S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          dvc remote modify s3remote region eu-north-1
          dvc pull --run-cache

      # ── Run the pipeline ────────────────────────────────────
      - name: DVC repro
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: dvc repro

      # ── Push updated outputs back to S3 ─────────────────────
      - name: DVC push to S3
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: dvc push

      # ── Commit dvc.lock + metrics back to git ───────────────
      - name: Commit pipeline outputs
        run: |
          git config user.email "ci@github-actions"
          git config user.name "GitHub Actions"
          git add dvc.lock metrics/ dvclive/
          git diff --staged --quiet || \
            git commit -m "ci: update pipeline outputs [skip ci]"
          git push || true

      # ── Extract final metrics for the report ────────────────
      - name: Extract metrics
        id: metrics
        run: |
          python3 - <<'PYEOF'
          import json, os

          out = os.environ["GITHUB_OUTPUT"]

          # ── Train + val accuracy from DVCLive (final epoch) ──
          # DVCLive writes final values to dvclive/metrics.json
          # Key names depend on what live.log_metric() is called with in train.py
          # Handles both flat keys (train_accuracy) and nested (train.accuracy)
          train_acc = train_loss = val_acc = val_loss = "N/A"
          try:
              with open("dvclive/metrics.json") as f:
                  live = json.load(f)
              train_acc  = live.get("train_accuracy",  live.get("train", {}).get("accuracy",  "N/A"))
              train_loss = live.get("train_loss",       live.get("train", {}).get("loss",      "N/A"))
              val_acc    = live.get("val_accuracy",     live.get("val",   {}).get("accuracy",  "N/A"))
              val_loss   = live.get("val_loss",         live.get("val",   {}).get("loss",      "N/A"))
              def fmt(v): return f"{v:.4f}" if isinstance(v, float) else str(v)
              train_acc = fmt(train_acc); train_loss = fmt(train_loss)
              val_acc   = fmt(val_acc);   val_loss   = fmt(val_loss)
          except Exception as e:
              print(f"dvclive/metrics.json: {e}")

          # ── Test accuracy from evaluate stage ─────────────────
          test_acc = test_f1 = "N/A"
          try:
              with open("metrics/eval.json") as f:
                  ev = json.load(f)
              test_acc = ev.get("accuracy", ev.get("test_accuracy", "N/A"))
              test_f1  = ev.get("f1_macro", ev.get("f1",            "N/A"))
              def fmt(v): return f"{v:.4f}" if isinstance(v, float) else str(v)
              test_acc = fmt(test_acc); test_f1 = fmt(test_f1)
          except Exception as e:
              print(f"metrics/eval.json: {e}")

          with open(out, "a") as f:
              f.write(f"train_acc={train_acc}\n")
              f.write(f"train_loss={train_loss}\n")
              f.write(f"val_acc={val_acc}\n")
              f.write(f"val_loss={val_loss}\n")
              f.write(f"test_acc={test_acc}\n")
              f.write(f"test_f1={test_f1}\n")

          print(f"train  acc={train_acc}  loss={train_loss}")
          print(f"val    acc={val_acc}    loss={val_loss}")
          print(f"test   acc={test_acc}   f1={test_f1}")
          PYEOF

      # ── Build and post CML report ───────────────────────────
      - name: Post CML report
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        run: |
          # ── Header ──
          echo "## ML Pipeline Report" >> report.md
          echo "" >> report.md
          echo "**Runner:** EC2 \`${{ inputs.instance_type || 't3.medium' }}\` spot (eu-north-1)" >> report.md
          echo "" >> report.md

          # ── Accuracy summary table ──
          echo "### Accuracy" >> report.md
          echo "" >> report.md
          echo "| Split | Accuracy | Loss |" >> report.md
          echo "|-------|----------|------|" >> report.md
          echo "| Train (last epoch) | \`${{ steps.metrics.outputs.train_acc }}\` | \`${{ steps.metrics.outputs.train_loss }}\` |" >> report.md
          echo "| Val   (last epoch) | \`${{ steps.metrics.outputs.val_acc }}\`   | \`${{ steps.metrics.outputs.val_loss }}\`   |" >> report.md
          echo "| Test  (held-out)   | \`${{ steps.metrics.outputs.test_acc }}\`  | —    |" >> report.md
          echo "" >> report.md
          echo "> F1 macro (test): \`${{ steps.metrics.outputs.test_f1 }}\`" >> report.md
          echo "" >> report.md

          # ── Metrics diff vs main ──
          echo "### Changes vs main" >> report.md
          echo "" >> report.md
          dvc metrics diff main --md >> report.md 2>/dev/null || \
            echo "_No previous run on main to compare against._" >> report.md
          echo "" >> report.md

          # ── Loss curve ──
          echo "### Loss curve" >> report.md
          echo "" >> report.md
          if [ -f metrics/loss_curve.png ]; then
            cml publish metrics/loss_curve.png --md >> report.md
          else
            echo "_loss_curve.png not found_" >> report.md
          fi
          echo "" >> report.md

          # ── Confusion matrix ──
          echo "### Confusion matrix (test set)" >> report.md
          echo "" >> report.md
          if [ -f metrics/confusion_matrix.png ]; then
            cml publish metrics/confusion_matrix.png --md >> report.md
          else
            echo "_confusion_matrix.png not found_" >> report.md
          fi

          # ── Post to PR or commit comment ──
          cml comment create report.md

      # ── Keep report as artifact for non-PR runs ─────────────
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ml-report
          path: |
            report.md
            metrics/
            dvclive/
          retention-days: 30