# ============================================================
# .github/workflows/train.yml
# Fashion MNIST MLOps — DVC + CML CI/CD Pipeline
#
# Triggers:
#   - Push / PR to main  → runs on GitHub-hosted runner (local)
#   - Manual dispatch    → choose local or cloud (EC2 via CML)
#
# Secrets required (Settings → Secrets → Actions):
#   AWS_ACCESS_KEY_ID
#   AWS_SECRET_ACCESS_KEY
#   DVCLIVE_STUDIO_TOKEN   (optional — DVC Studio integration)
# ============================================================

name: ML Pipeline

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "configs/**"
      - "params.yaml"
      - "dvc.yaml"
      - "requirements.txt"

  pull_request:
    branches: [main]
    paths:
      - "src/**"
      - "configs/**"
      - "params.yaml"
      - "dvc.yaml"

  workflow_dispatch:
    inputs:
      run_on_cloud:
        description: "Run pipeline on a cloud EC2 instance (via CML)"
        type: boolean
        default: false
      instance_type:
        description: "EC2 instance type (only used when run_on_cloud=true)"
        type: choice
        default: "t3.xlarge"
        options:
          - t3.xlarge        # 4 vCPU, 16 GB  — cheap CPU baseline
          - m5.xlarge        # 4 vCPU, 16 GB  — general purpose
          - c5.2xlarge       # 8 vCPU, 16 GB  — compute optimised
          - g4dn.xlarge      # 4 vCPU, 16 GB + T4 GPU
          - g4dn.2xlarge     # 8 vCPU, 32 GB + T4 GPU
      spot_instance:
        description: "Use EC2 spot instance (cheaper, ~70% off, may be interrupted)"
        type: boolean
        default: true

# ──────────────────────────────────────────────────────────────
# Global env — AWS credentials available to every job
# ──────────────────────────────────────────────────────────────
env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_DEFAULT_REGION: eu-north-1

# ──────────────────────────────────────────────────────────────
# Job 1: setup — decide runner type, optionally launch EC2
# ──────────────────────────────────────────────────────────────
jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      runner-label: ${{ steps.pick_runner.outputs.runner-label }}

    steps:
      - uses: actions/checkout@v4

      - uses: iterative/setup-cml@v3

      # ── If cloud requested: launch EC2 self-hosted runner ──
      - name: Launch cloud runner (EC2)
        if: ${{ inputs.run_on_cloud == true }}
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          SPOT_FLAG=""
          if [[ "${{ inputs.spot_instance }}" == "true" ]]; then
            SPOT_FLAG="--cloud-spot"
          fi

          cml runner launch \
            --cloud=aws \
            --cloud-region=${AWS_DEFAULT_REGION} \
            --cloud-type=${{ inputs.instance_type || 't3.xlarge' }} \
            ${SPOT_FLAG} \
            --labels=cml-ec2 \
            --idle-timeout=3600 \
            --single &

          echo "Cloud runner launched with label: cml-ec2"

      # ── Output the label the train job should run on ──
      - name: Pick runner label
        id: pick_runner
        run: |
          if [[ "${{ inputs.run_on_cloud }}" == "true" ]]; then
            echo "runner-label=cml-ec2" >> $GITHUB_OUTPUT
            echo "Pipeline will run on: EC2 (${{ inputs.instance_type }})"
          else
            echo "runner-label=ubuntu-latest" >> $GITHUB_OUTPUT
            echo "Pipeline will run on: GitHub-hosted runner (ubuntu-latest)"
          fi

  # ──────────────────────────────────────────────────────────────
  # Job 2: train — run DVC pipeline + generate CML report
  # ──────────────────────────────────────────────────────────────
  train:
    needs: setup
    runs-on: ${{ needs.setup.outputs.runner-label }}
    timeout-minutes: 120

    steps:
      - uses: actions/checkout@v4

      # ── Python + deps ──
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── CML (for report posting) ──
      - uses: iterative/setup-cml@v3

      # ── Pull DVC-tracked data + models from S3 ──
      - name: DVC pull (data + models from S3)
        run: |
          dvc remote modify s3remote region ${AWS_DEFAULT_REGION}
          dvc pull --run-cache

      # ── Run the full pipeline ──
      - name: DVC reproduce pipeline
        env:
          DVCLIVE_STUDIO_TOKEN: ${{ secrets.DVCLIVE_STUDIO_TOKEN }}
        run: dvc repro --pull

      # ── Push outputs (data, models, run cache) to S3 ──
      - name: DVC push to S3
        run: dvc push

      # ── Commit updated dvc.lock / metrics back to git ──
      - name: Commit pipeline outputs
        run: |
          git config user.email "ci@github-actions"
          git config user.name "GitHub Actions"
          git add dvc.lock metrics/ dvclive/
          git diff --staged --quiet || git commit -m "ci: update pipeline outputs [skip ci]"
          git push || true

      # ── Extract final train / test accuracy for the report ──
      - name: Extract metrics
        id: metrics
        run: |
          python3 - <<'PYEOF'
          import json, os

          # ── Train accuracy: last epoch from DVCLive ──
          # dvclive/metrics.json holds the FINAL values logged by DVCLive
          train_acc = "N/A"
          train_loss = "N/A"
          try:
              with open("dvclive/metrics.json") as f:
                  live = json.load(f)
              # DVCLive nests under the metric group key — try both flat and nested
              train_acc  = live.get("train_accuracy",
                          live.get("train", {}).get("accuracy", "N/A"))
              train_loss = live.get("train_loss",
                          live.get("train", {}).get("loss", "N/A"))
              if isinstance(train_acc,  float): train_acc  = f"{train_acc:.4f}"
              if isinstance(train_loss, float): train_loss = f"{train_loss:.4f}"
          except Exception as e:
              print(f"dvclive/metrics.json read error: {e}")

          # ── Val accuracy: last epoch from DVCLive ──
          val_acc = "N/A"
          val_loss = "N/A"
          try:
              val_acc  = live.get("val_accuracy",
                         live.get("val", {}).get("accuracy", "N/A"))
              val_loss = live.get("val_loss",
                         live.get("val", {}).get("loss", "N/A"))
              if isinstance(val_acc,  float): val_acc  = f"{val_acc:.4f}"
              if isinstance(val_loss, float): val_loss = f"{val_loss:.4f}"
          except Exception:
              pass

          # ── Test accuracy: from evaluate stage output ──
          test_acc = "N/A"
          test_f1  = "N/A"
          try:
              with open("metrics/eval.json") as f:
                  ev = json.load(f)
              test_acc = ev.get("accuracy", ev.get("test_accuracy", "N/A"))
              test_f1  = ev.get("f1_macro", ev.get("f1",             "N/A"))
              if isinstance(test_acc, float): test_acc = f"{test_acc:.4f}"
              if isinstance(test_f1,  float): test_f1  = f"{test_f1:.4f}"
          except Exception as e:
              print(f"metrics/eval.json read error: {e}")

          # Write to GITHUB_OUTPUT so the next step can use them
          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a") as f:
              f.write(f"train_acc={train_acc}\n")
              f.write(f"train_loss={train_loss}\n")
              f.write(f"val_acc={val_acc}\n")
              f.write(f"val_loss={val_loss}\n")
              f.write(f"test_acc={test_acc}\n")
              f.write(f"test_f1={test_f1}\n")

          print(f"train_acc={train_acc}  train_loss={train_loss}")
          print(f"val_acc={val_acc}      val_loss={val_loss}")
          print(f"test_acc={test_acc}    test_f1={test_f1}")
          PYEOF

      # ── Generate CML report and post to PR ──
      - name: Generate CML report
        env:
          REPO_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ── Header ──
          echo "## 📊 ML Pipeline Report" >> report.md
          echo "" >> report.md

          # ── Runner info ──
          if [[ "${{ inputs.run_on_cloud }}" == "true" ]]; then
            echo "**🖥️ Runner:** EC2 \`${{ inputs.instance_type }}\` (eu-north-1)" >> report.md
          else
            echo "**🖥️ Runner:** GitHub-hosted (ubuntu-latest)" >> report.md
          fi
          echo "" >> report.md

          # ── Final accuracy summary table (top of report) ──
          echo "### 🎯 Final Accuracy Summary" >> report.md
          echo "" >> report.md
          echo "| Split | Accuracy | Loss |" >> report.md
          echo "|-------|----------|------|" >> report.md
          echo "| **Train** (last epoch) | \`${{ steps.metrics.outputs.train_acc }}\` | \`${{ steps.metrics.outputs.train_loss }}\` |" >> report.md
          echo "| **Val**   (last epoch) | \`${{ steps.metrics.outputs.val_acc }}\`   | \`${{ steps.metrics.outputs.val_loss }}\`   |" >> report.md
          echo "| **Test**  (held-out)   | \`${{ steps.metrics.outputs.test_acc }}\`  | —    |" >> report.md
          echo "" >> report.md
          echo "> F1 (macro, test): \`${{ steps.metrics.outputs.test_f1 }}\`" >> report.md
          echo "" >> report.md

          # ── Metrics diff vs main ──
          echo "### 🔀 Metrics vs \`main\`" >> report.md
          echo "" >> report.md
          dvc metrics diff main --md >> report.md || echo "_No diff available (first run or no prior commit)._" >> report.md
          echo "" >> report.md

          # ── Train/Val loss & accuracy curves ──
          echo "### 📉 Training Curves (loss · accuracy)" >> report.md
          echo "" >> report.md
          if [ -f metrics/accuracy_curve.png ]; then
            cml publish metrics/accuracy_curve.png --md >> report.md
          fi
          if [ -f metrics/loss_curve.png ]; then
            cml publish metrics/loss_curve.png --md >> report.md
          fi
          echo "" >> report.md

          # ── Confusion matrix ──
          echo "### 🔲 Confusion Matrix (test set)" >> report.md
          echo "" >> report.md
          if [ -f metrics/confusion_matrix.png ]; then
            cml publish metrics/confusion_matrix.png --md >> report.md
          fi
          echo "" >> report.md

          # ── DVCLive step-level interactive plot ──
          echo "### 📊 Step-level DVCLive Plot" >> report.md
          echo "" >> report.md
          dvc plots show dvclive/plots/metrics \
            --template smooth \
            -x step \
            -y train_accuracy,val_accuracy \
            --title "Train vs Val Accuracy" \
            -o dvclive_accuracy.html 2>/dev/null || true
          if [ -f dvclive_accuracy.html ]; then
            cml publish dvclive_accuracy.html --md >> report.md
          fi

          # ── Post to PR (or commit comment for direct pushes) ──
          cml comment create report.md

      # ── Upload report as artifact (always, for non-PR runs) ──
      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ml-report
          path: |
            report.md
            metrics/
            dvclive/
          retention-days: 30
