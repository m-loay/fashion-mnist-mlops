# =============================================================
# .github/workflows/train.yml
#
# TRIGGERS:
#   - Push to main          → trains on AWS EC2
#   - PR targeting main     → trains on AWS EC2, posts report to PR
#   - Manual dispatch       → choose instance type
#
# SECRETS:
#   AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
#   AWS_SUBNET_ID, AWS_SECURITY_GROUP_ID
#   CML_PAT
# =============================================================

name: ML Pipeline

permissions:
  contents: write
  pull-requests: write

on:
  push:
    branches: [main]
    paths: ["src/**", "configs/**", "params.yaml", "dvc.yaml", "requirements.txt"]

  pull_request:
    branches: [main]
    paths: ["src/**", "configs/**", "params.yaml", "dvc.yaml"]

  workflow_dispatch:
    inputs:
      instance_type:
        description: "EC2 instance type"
        type: choice
        default: "t3.small"
        options: [t3.small, t3.micro]

# =============================================================
# Job 1 — provision EC2 spot runner
# =============================================================
jobs:
  start-runner:
    runs-on: ubuntu-latest
    outputs:
      runner-label: ${{ steps.ec2.outputs.label }}
      instance-id:  ${{ steps.ec2.outputs.ec2-instance-id }}
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            eu-north-1

      - name: Start EC2 runner
        id: ec2
        uses: machulav/ec2-github-runner@v2
        with:
          mode:              start
          github-token:      ${{ secrets.CML_PAT }}
          ec2-image-id:      ami-0028809abe98af413
          ec2-instance-type: ${{ inputs.instance_type || 't3.small' }}
          subnet-id:         ${{ secrets.AWS_SUBNET_ID }}
          security-group-id: ${{ secrets.AWS_SECURITY_GROUP_ID }}
          market-type:       spot
          startup-timeout-minutes: 10
          pre-runner-script: |
            sudo apt-get update -y -q
            sudo apt-get install -y -q docker.io
            sudo systemctl enable docker && sudo systemctl start docker

# =============================================================
# Job 2 — run DVC pipeline
# =============================================================
  train:
    needs: start-runner
    runs-on: ${{ needs.start-runner.outputs.runner-label }}
    timeout-minutes: 90
    container:
      image: ghcr.io/m-loay/dvc-cml-mlops:latest
    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install ML dependencies
        run: pip install --no-cache-dir -r requirements.txt

      - name: DVC pull
        run: |
          dvc remote modify s3remote region eu-north-1
          dvc pull --run-cache

      - name: DVC repro
        run: dvc repro

      - name: DVC push
        run: dvc push

      - name: Commit & push pipeline outputs
        run: |
          git config user.email "ci@github-actions"
          git config user.name  "GitHub Actions"
          git add dvc.lock dvclive/
          git add -f metrics/*.png metrics/eval.json
          git diff --staged --quiet || \
            git commit -m "ci: update pipeline outputs [skip ci]"
          git push origin HEAD:${{ github.head_ref || github.ref_name }}

      - name: Extract metrics
        id: metrics
        run: |
          python3 - <<'EOF'
          import json, os

          fmt = lambda v: f"{v:.4f}" if isinstance(v, float) else str(v)
          out = os.environ["GITHUB_OUTPUT"]
          train_acc = test_acc = "N/A"

          try:
              live = json.load(open("dvclive/metrics.json"))
              train_acc = fmt(live["accuracy"]["train"])
          except Exception as e:
              print(f"dvclive error: {e}")

          try:
              ev = json.load(open("metrics/eval.json"))
              test_acc = fmt(ev.get("test_accuracy", ev.get("accuracy", "N/A")))
          except Exception as e:
              print(f"eval error: {e}")

          with open(out, "a") as f:
              f.write(f"train_acc={train_acc}\ntest_acc={test_acc}\n")

          print(f"train={train_acc}  test={test_acc}")
          EOF

      - name: Build report
        run: |
          SHA=$(git rev-parse HEAD)
          RAW="https://raw.githubusercontent.com/${{ github.repository }}/${SHA}"

          cat > report.md <<EOF
          ## ML Pipeline Report

          | Split | Accuracy |
          |-------|----------|
          | Train | \`${{ steps.metrics.outputs.train_acc }}\` |
          | Test  | \`${{ steps.metrics.outputs.test_acc }}\`  |

          ### Loss Curve
          ![Loss Curve](${RAW}/metrics/loss_curve.png)

          ### Confusion Matrix
          ![Confusion Matrix](${RAW}/metrics/confusion_matrix.png)
          EOF

      - name: Post step summary
        if: always()
        run: cat report.md >> $GITHUB_STEP_SUMMARY

      - name: Post PR comment
        if: github.event.pull_request.number != ''
        run: |
          python3 -c "
          import json
          json.dump({'body': open('report.md').read()}, open('payload.json','w'))
          "
          RESPONSE=$(curl -s -w "\nHTTP_STATUS:%{http_code}" \
            -X POST \
            -H "Authorization: token ${{ secrets.CML_PAT }}" \
            -H "Content-Type: application/json" \
            -d @payload.json \
            "https://api.github.com/repos/${{ github.repository }}/issues/${{ github.event.pull_request.number }}/comments")

          STATUS=$(echo "$RESPONSE" | grep HTTP_STATUS | cut -d: -f2)
          echo "HTTP Status: $STATUS"
          [ "$STATUS" = "201" ] || { echo "ERROR: comment post failed"; exit 1; }

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ml-report
          path: |
            report.md
            metrics/
            dvclive/
          retention-days: 30

# =============================================================
# Job 3 — terminate EC2 runner (always runs)
# =============================================================
  stop-runner:
    needs: [start-runner, train]
    runs-on: ubuntu-latest
    if: always() && needs.start-runner.result == 'success'
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            eu-north-1

      - name: Stop EC2 runner
        uses: machulav/ec2-github-runner@v2
        with:
          mode:            stop
          github-token:    ${{ secrets.CML_PAT }}
          label:           ${{ needs.start-runner.outputs.runner-label }}
          ec2-instance-id: ${{ needs.start-runner.outputs.instance-id }}